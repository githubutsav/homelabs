services:
  nginx:
    image: nginx:latest
    container_name: nginx-compose
    ports:
      - "8081:80"
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-compose
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: postgres-compose
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_compose_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_compose_data:
